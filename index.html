<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adalam Web Consultas</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, Segoe UI, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f6f7f9;
      color: #1a1a1a;
    }
    h1 { font-size: 1.35rem; margin-bottom: 0.25rem; }
    .sub { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      resize: vertical;
    }
    #answer { min-height: 220px; background: #fff; }
    button {
      margin-top: 0.75rem;
      padding: 0.65rem 1.25rem;
      font-size: 1rem;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .meta { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
    .err { color: #c5221f; margin-top: 0.5rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Adalam Web Consultas</h1>
  <p class="sub">Preguntas sobre calificaciones (CSV en Cloud). Análisis con GPT-5.</p>

  <label for="question">Tu pregunta</label>
  <textarea id="question" placeholder="Ej.: Analiza el paralelo A y sugiere acciones basadas solo en decimo.csv"></textarea>
  <button type="button" id="send">Enviar</button>
  <p class="meta" id="status"></p>
  <p class="err" id="error"></p>

  <label for="answer" style="margin-top:1.25rem">Respuesta</label>
  <textarea id="answer" readonly placeholder="La respuesta aparecerá aquí…"></textarea>

  <script>
    const API = "https://adalam-api-279160003584.southamerica-east1.run.app";

    document.getElementById("send").addEventListener("click", async () => {
      const q = document.getElementById("question").value.trim();
      const btn = document.getElementById("send");
      const status = document.getElementById("status");
      const errEl = document.getElementById("error");
      const out = document.getElementById("answer");
      errEl.textContent = "";
      status.textContent = "";
      if (!q) {
        errEl.textContent = "Escribe una pregunta.";
        return;
      }
      btn.disabled = true;
      status.textContent = "Consultando (puede tardar un minuto)…";
      out.value = "";
      try {
        const res = await fetch(API + "/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || JSON.stringify(data));
        }
        out.value = data.answer || "";
        status.textContent = "Modelo: " + (data.model || "—") + " · Archivos: " + (data.files_used || []).join(", ");
      } catch (e) {
        errEl.textContent = String(e.message || e);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
